<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes - Développement Sécurisé</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f6fa;
      color: #2d3436;
      display: flex;
      flex-direction: column;
      padding: 18px 24px 12px;
    }

    h1 {
      text-align: center;
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 4px;
      color: #1e1e2e;
      flex-shrink: 0;
    }

    #last-update {
      text-align: center;
      font-size: 12px;
      color: #888;
      margin-bottom: 14px;
      flex-shrink: 0;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .columns-wrapper {
      display: grid;
      grid-template-columns: 1fr 28px 1fr;
    }

    .col-divider {
      display: flex;
      align-items: stretch;
    }

    .col-divider::after {
      content: '';
      display: block;
      width: 2px;
      background: linear-gradient(to bottom, transparent, #d0d0de 8%, #d0d0de 92%, transparent);
      margin: 0 auto;
      border-radius: 1px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      background: #f0f0f5;
      padding: 10px 12px;
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: #666;
    }

    tbody tr {
      border-top: 1px solid #f0f0f0;
      transition: background .15s;
    }

    tbody tr.highlight {
      animation: flash 1s ease-out;
    }

    @keyframes flash {
      0%   { background: #fffbcc; }
      100% { background: transparent; }
    }

    td {
      padding: 8px 12px;
      font-size: 13px;
      white-space: nowrap;
    }

    .note-cell {
      font-weight: 600;
      width: 60px;
      white-space: nowrap;
    }

    .bar-cell { width: 120px; }

    .bar-wrap {
      background: #eee;
      border-radius: 4px;
      height: 7px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width .4s ease;
    }

    .bar-red    { background: #e74c3c; }
    .bar-orange { background: #e67e22; }
    .bar-green  { background: #27ae60; }

    footer {
      color: #aaa;
      font-size: 12px;
      margin-top: 10px;
      text-align: center;
      flex-shrink: 0;
    }

    footer a { color: #aaa; text-decoration: none; }
    footer a:hover { color: #888; }

    #last-update.error { color: #e74c3c; }

    @keyframes shimmer {
      0%   { background-position: -500px 0; }
      100% { background-position:  500px 0; }
    }
    .skel {
      display: inline-block;
      height: 12px;
      border-radius: 4px;
      background: linear-gradient(90deg, #ebebeb 25%, #d8d8d8 50%, #ebebeb 75%);
      background-size: 1000px 100%;
      animation: shimmer 1.4s ease-in-out infinite;
    }
    .skeleton-row td { padding: 14px 16px; vertical-align: middle; }
  </style>
</head>
<body>
  <img src="/assets/Efrei-logo-couleur.svg" alt="Efrei"
       style="position:absolute; top:18px; left:24px; height:28px; opacity:.9;">
  <h1>Notes : Développement Sécurisé</h1>
  <div id="last-update">Chargement…</div>

  <div class="card">
    <div class="columns-wrapper">
      <table>
        <thead>
          <tr>
            <th>Nom</th>
            <th>Prénom</th>
            <th>Note</th>
            <th>Progression</th>
          </tr>
        </thead>
        <tbody id="tbody-left"></tbody>
      </table>
      <div class="col-divider"></div>
      <table>
        <thead>
          <tr>
            <th>Nom</th>
            <th>Prénom</th>
            <th>Note</th>
            <th>Progression</th>
          </tr>
        </thead>
        <tbody id="tbody-right"></tbody>
      </table>
    </div>
  </div>

  <footer>
    Propulsé par GL Conseil ·
    <a href="https://github.com/Gladrat" target="_blank">
      <img src="https://github.com/Gladrat.png" width="18"
           style="border-radius:50%; vertical-align:middle; margin-right:4px">
      Gladrat
    </a>
  </footer>

  <script>
    const tbodyLeft  = document.getElementById("tbody-left");
    const tbodyRight = document.getElementById("tbody-right");
    const lastUpdate = document.getElementById("last-update");
    let prevNotes = {};
    let hasData = false;

    const SKEL_WIDTHS = [
      [118, 72], [84, 58], [132, 76], [96, 64], [108, 80],
      [74, 62], [124, 88], [88, 68], [100, 56], [114, 74],
      [78, 66], [102, 82]
    ];

    function renderSkeleton() {
      tbody.innerHTML = SKEL_WIDTHS.map(([w1, w2]) => `
        <tr class="skeleton-row">
          <td><div class="skel" style="width:${w1}px"></div></td>
          <td><div class="skel" style="width:${w2}px"></div></td>
          <td><div class="skel" style="width:44px"></div></td>
          <td><div class="skel" style="width:${80 + w2}px"></div></td>
        </tr>
      `).join("");
    }

    function barClass(note, sur) {
      const pct = note / sur;
      if (pct > 0.6) return "bar-green";
      if (pct >= 0.5) return "bar-orange";
      return "bar-red";
    }

    function renderHalf(etudiants, tbody, offset) {
      etudiants.forEach((e, j) => {
        const i = offset + j;
        const key = `${e.nom}-${e.prenom}`;
        const pct = Math.round((e.note / e.sur) * 100);
        const cls = barClass(e.note, e.sur);
        const changed = prevNotes[key] !== undefined && prevNotes[key] !== e.note;
        prevNotes[key] = e.note;

        let row = document.getElementById(`row-${i}`);
        if (!row) {
          row = document.createElement("tr");
          row.id = `row-${i}`;
          row.innerHTML = `
            <td class="nom"></td>
            <td class="prenom"></td>
            <td class="note-cell"></td>
            <td class="bar-cell"><div class="bar-wrap"><div class="bar-fill"></div></div></td>
          `;
          tbody.appendChild(row);
        }

        row.querySelector(".nom").textContent = e.nom;
        row.querySelector(".prenom").textContent = e.prenom;
        row.querySelector(".note-cell").textContent = `${e.note}/${e.sur}`;

        const fill = row.querySelector(".bar-fill");
        fill.style.width = pct + "%";
        fill.className = `bar-fill ${cls}`;

        if (changed) {
          row.classList.remove("highlight");
          void row.offsetWidth;
          row.classList.add("highlight");
        }
      });
    }

    function render(etudiants) {
      const mid = Math.ceil(etudiants.length / 2);
      renderHalf(etudiants.slice(0, mid), tbodyLeft, 0);
      renderHalf(etudiants.slice(mid), tbodyRight, mid);
    }

    async function refresh() {
      try {
        const res = await fetch("/notes");
        if (!res.ok) throw new Error();
        const data = await res.json();
        if (!hasData) {
          tbody.innerHTML = "";
          hasData = true;
        }
        render(data.etudiants);
        lastUpdate.classList.remove("error");
        const now = new Date();
        lastUpdate.textContent = `Dernière mise à jour : ${now.toLocaleTimeString("fr-FR")}`;
      } catch {
        lastUpdate.classList.add("error");
        lastUpdate.textContent = "Erreur de chargement - nouvelle tentative…";
      }
    }

    renderSkeleton();
    refresh();
    setInterval(refresh, 3000);
  </script>
</body>
</html>
